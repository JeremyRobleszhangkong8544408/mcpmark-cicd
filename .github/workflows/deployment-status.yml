name: Deployment Status

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create_issue.outputs.result.issueNumber }}
      prev_sha: ${{ steps.get_prev_sha.outputs.prev_sha }}
      current_sha: ${{ github.sha }}
      package_version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Get previous commit SHA
        id: get_prev_sha
        run: echo "prev_sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const commitSha = context.sha;
            const prevSha = '${{ steps.get_prev_sha.outputs.prev_sha }}';
            const packageVersion = '${{ steps.get_version.outputs.version }}';

            const issue = await github.rest.issues.create({
              owner: owner,
              repo: repo,
              title: `Deployment Tracking - ${commitSha}`,
              labels: ['deployment', 'in-progress'],
              body: `Tracking deployment for commit: ${commitSha}
              Previous commit: ${prevSha}
              Package version: ${packageVersion}`
            });

            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issue.data.number,
              body: "Pre-deployment checks completed"
            });

            return { issueNumber: issue.data.number };

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.rollback_artifacts.outputs.artifact_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create rollback artifacts
        id: rollback_artifacts
        run: |
          # Create rollback script
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          if [ $# -ne 1 ]; then
            echo "Error: Missing previous commit SHA"
            echo "Usage: $0 <previous-commit-sha>"
            exit 1
          fi
          PREV_SHA="$1"

          echo "=== Starting Rollback Process ==="
          echo "Target commit: $PREV_SHA"

          if ! git rev-parse --verify "$PREV_SHA" > /dev/null 2>&1; then
            echo "Error: Commit $PREV_SHA does not exist"
            exit 1
          fi

          echo "Stashing local changes..."
          git stash push -m "rollback-stash" || true

          echo "Checking out $PREV_SHA..."
          git checkout "$PREV_SHA"

          echo "Installing dependencies..."
          npm ci

          echo "=== Rollback Completed Successfully ==="
          EOF
          chmod +x rollback.sh

          # Create dependency verification script
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "=== Verifying Dependencies ==="
          echo "Checking production dependencies..."
          npm ls --prod --depth=0

          echo "Checking dependency compatibility..."
          npm audit --production --audit-level=high

          echo "=== Dependencies Verified Successfully ==="
          EOF
          chmod +x verify-dependencies.sh

          # Create configuration backups
          cp package.json package.json.rollback.bak
          cp package-lock.json package-lock.json.rollback.bak

          # Create rollback documentation
          cat > rollback-documentation.md << EOF
          # Rollback Documentation for Commit ${{ needs.pre-deployment.outputs.current_sha }}
          ## Overview
          This rollback package allows reverting to commit ${{ needs.pre-deployment.outputs.prev_sha }}

          ## Components Included
          1. rollback.sh - Executable rollback script
          2. verify-dependencies.sh - Dependency verification script
          3. package.json.rollback.bak - Backup of current package.json
          4. package-lock.json.rollback.bak - Backup of current package-lock.json
          5. rollback-documentation.md - This document

          ## Step-by-Step Rollback Instructions
          1. **Download and Extract Artifact**
             - Go to the GitHub Actions run for this deployment
             - Download the rollback artifact
             - Extract the contents to your project directory

          2. **Verify Dependencies**
             - Run: \`./verify-dependencies.sh\`
             - Ensure no critical errors are reported

          3. **Perform Rollback**
             - Run: \`./rollback.sh ${{ needs.pre-deployment.outputs.prev_sha }}\`
             - Follow the on-screen instructions

          4. **Post-Rollback Verification**
             - Run tests: \`npm test\`
             - Run lint: \`npm run lint\`
             - Verify application functionality
          EOF

          # Create compressed package
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current_sha }}"
          zip -r "${ARTIFACT_NAME}.zip" rollback.sh verify-dependencies.sh rollback-documentation.md package.json.rollback.bak package-lock.json.rollback.bak

          # Calculate checksum
          SHA256_CHECKSUM=$(sha256sum "${ARTIFACT_NAME}.zip" | awk '{print $1}')

          # Export outputs
          echo "artifact_name=${ARTIFACT_NAME}.zip" >> $GITHUB_OUTPUT
          echo "sha256=${SHA256_CHECKSUM}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rollback_artifacts.outputs.artifact_name }}
          path: ${{ steps.rollback_artifacts.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback ready comment
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const prevSha = '${{ needs.pre-deployment.outputs.prev_sha }}';
            const currentSha = '${{ needs.pre-deployment.outputs.current_sha }}';
            const packageVersion = '${{ needs.pre-deployment.outputs.package_version }}';
            const artifactName = '${{ steps.rollback_artifacts.outputs.artifact_name }}';
            const sha256 = '${{ steps.rollback_artifacts.outputs.sha256 }}';

            const commentBody = `## 🔄 Rollback Plan Ready
            - Previous Commit: ${prevSha}
            - Current Commit: ${currentSha}
            - Package Version: ${packageVersion}
            - Artifact: ${artifactName}
            
            ### Completed Rollback Components
            - ✅ Rollback script created (with error handling)
            - ✅ Configuration backups (package.json + package-lock.json)
            - ✅ Dependency verification script created
            - ✅ Detailed rollback documentation written
            - ✅ Compressed rollback package with checksum
            
            ### Quick Rollback Command
            \`\`\`bash
            # 1. Download and extract the rollback artifact first
            # 2. Make scripts executable: chmod +x rollback.sh verify-dependencies.sh
            # 3. Verify dependencies: ./verify-dependencies.sh
            # 4. Perform rollback:
            ./rollback.sh ${prevSha}
            \`\`\`
            
            ### Verification Status
            - Rollback script created: true
            - Configuration backup: true
            - SHA256: ${sha256}`;

            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              body: commentBody
            });

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const artifactName = '${{ needs.rollback-preparation.outputs.artifact_name }}';

            # Remove in-progress label
            try {
              await github.rest.issues.removeLabel({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                name: 'in-progress'
              });
            } catch (err) {
              console.log("in-progress label not found, skipping removal");
            }

            # Add completed label
            await github.rest.issues.addLabels({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              labels: ['completed']
            });

            # Post final comment
            const finalComment = `## Deployment Completed Successfully
            Rollback artifact details:
            - Artifact Name: ${artifactName}
            - Retention Period: 30 days
            - To perform a rollback: Follow instructions in the rollback documentation`;

            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              body: finalComment
            });

            # Close the issue
            await github.rest.issues.update({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              state: 'closed'
            });
